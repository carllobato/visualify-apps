<!--
  Supabase Auth → Password changed notification (HTML body)

  Dashboard: Authentication → Email Templates → Password changed notification
  (or enable via project Auth settings / config where this template is supported)

  Subject (suggested): Your Visualify password was updated

  Template variables: https://supabase.com/docs/guides/auth/auth-email-templates
-->
<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="color-scheme" content="light only" />
    <meta name="supported-color-schemes" content="light only" />
  </head>
  <body
    bgcolor="#f7f7f8"
    style="margin:0;padding:0;background-color:#f7f7f8;color:#111111;-webkit-font-smoothing:antialiased;"
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      border="0"
      bgcolor="#f7f7f8"
      style="margin:0;padding:0;width:100%;background-color:#f7f7f8;"
    >
      <tr>
        <td
          align="center"
          bgcolor="#f7f7f8"
          style="padding:24px 12px;background-color:#f7f7f8;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;"
        >
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="width:100%;max-width:600px;">
            <tr>
              <td bgcolor="#ffffff" style="background-color:#ffffff;border:1px solid #e6e6e8;border-radius:16px;padding:24px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="font-size:16px;line-height:24px;font-weight:600;color:#111111;padding:0 0 14px 0;">
                      Visualify | Risk AI
                    </td>
                  </tr>
                  <tr>
                    <td style="border-top:1px solid #e6e6e8;font-size:0;line-height:0;height:0;padding:0 0 14px 0;">&nbsp;</td>
                  </tr>
                  <tr>
                    <td style="font-size:24px;line-height:30px;font-weight:700;color:#111111;padding:0 0 14px 0;">
                      Your password has been changed
                    </td>
                  </tr>
                  <tr>
                    <td style="font-size:16px;line-height:24px;color:#111111;padding:0 0 10px 0;">Hi there,</td>
                  </tr>
                  <tr>
                    <td style="font-size:16px;line-height:24px;color:#5f6368;padding:0 0 16px 0;">
                      Your password for Visualify has been successfully updated.
                    </td>
                  </tr>
                  <tr>
                    <td style="font-size:16px;line-height:24px;color:#5f6368;padding:0 0 20px 0;">
                      This notice applies to
                      <span style="font-weight:700;color:#111111;">{{ .Email }}</span>.
                    </td>
                  </tr>
                  <tr>
                    <td style="font-size:13px;line-height:18px;color:#5f6368;padding:0 0 14px 0;">
                      If you did not make this change, please contact support immediately.
                    </td>
                  </tr>
                  <tr>
                    <td style="padding-top:12px;border-top:1px solid #e6e6e8;font-size:12px;line-height:16px;color:#9aa0a6;">
                      Powered by Visualify
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
